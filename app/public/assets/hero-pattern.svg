<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <g fill="none" stroke="#4A90C8" stroke-linecap="round" stroke-linejoin="round" opacity="0.18">
    <!-- Phone portrait 1 -->
    <rect x="30" y="60" width="64" height="110" rx="12"/>
    <rect x="39" y="74" width="46" height="78" rx="3"/>
    <circle cx="62" cy="163" r="4"/>
    <line x1="55" y1="68" x2="69" y2="68"/>

    <!-- Phone landscape -->
    <rect x="180" y="20" width="110" height="64" rx="12"/>
    <rect x="192" y="29" width="86" height="46" rx="3"/>
    <circle cx="169" cy="52" r="4"/>

    <!-- Tablet -->
    <rect x="560" y="30" width="100" height="140" rx="14"/>
    <rect x="570" y="44" width="80" height="108" rx="3"/>
    <circle cx="610" cy="162" r="5"/>

    <!-- Laptop -->
    <rect x="340" y="280" width="190" height="120" rx="8"/>
    <rect x="350" y="290" width="170" height="96" rx="3"/>
    <rect x="310" y="400" width="250" height="10" rx="5"/>
    <rect x="415" y="397" width="42" height="4" rx="2"/>

    <!-- Headphones -->
    <path d="M 700 120 Q 700 55 760 55 Q 820 55 820 120" stroke-width="2"/>
    <rect x="690" y="120" width="20" height="32" rx="6"/>
    <rect x="810" y="120" width="20" height="32" rx="6"/>

    <!-- Smartwatch -->
    <rect x="80" y="320" width="52" height="64" rx="16"/>
    <rect x="88" y="330" width="36" height="44" rx="4"/>
    <rect x="88" y="314" width="12" height="8" rx="3"/>
    <rect x="108" y="314" width="12" height="8" rx="3"/>
    <rect x="88" y="384" width="12" height="8" rx="3"/>
    <rect x="108" y="384" width="12" height="8" rx="3"/>
    <line x1="93" y1="352" x2="106" y2="352"/>
    <line x1="93" y1="346" x2="106" y2="346"/>

    <!-- USB cable -->
    <path d="M 230 350 Q 270 310 310 350 Q 350 390 390 350"/>
    <rect x="222" y="344" width="16" height="12" rx="3"/>

    <!-- Earbuds -->
    <circle cx="480" cy="80" r="18"/>
    <circle cx="480" cy="80" r="8"/>
    <path d="M 480 98 Q 500 120 520 110"/>
    <circle cx="535" cy="80" r="18"/>
    <circle cx="535" cy="80" r="8"/>
    <path d="M 535 98 Q 555 120 575 110"/>

    <!-- Phone portrait 2 (right side) -->
    <rect x="820" y="280" width="60" height="104" rx="11"/>
    <rect x="828" y="292" width="44" height="74" rx="3"/>
    <circle cx="850" cy="376" r="4"/>

    <!-- Small circuit dots pattern -->
    <circle cx="460" cy="220" r="3"/>
    <circle cx="480" cy="220" r="3"/>
    <circle cx="500" cy="220" r="3"/>
    <line x1="460" y1="220" x2="500" y2="220"/>
    <line x1="460" y1="210" x2="460" y2="230"/>
    <line x1="500" y1="210" x2="500" y2="230"/>

    <!-- Tablet 2 (bottom left) -->
    <rect x="20" y="370" width="130" height="90" rx="12"/>
    <rect x="30" y="380" width="110" height="70" rx="3"/>
    <circle cx="85" cy="455" r="4"/>

    <!-- Phone 3 (top right area) -->
    <rect x="730" y="30" width="56" height="96" rx="10"/>
    <rect x="738" y="42" width="40" height="68" rx="2"/>
    <circle cx="758" cy="120" r="3"/>
